version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - mkdir -p deploy && cp -r out/. deploy/
        - ls -la deploy/index.html
  artifacts:
    baseDirectory: deploy
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
