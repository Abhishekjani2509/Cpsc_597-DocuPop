version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - ls -la out/ || echo "OUT DIR NOT FOUND"
        - ls -la out/index.html || echo "INDEX.HTML NOT FOUND"
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
